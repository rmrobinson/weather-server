services:
  weatherd:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - WEATHER_PSK=${WEATHER_PSK}
    volumes:
      - ../config.yaml:/config.yaml:ro
    depends_on:
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
