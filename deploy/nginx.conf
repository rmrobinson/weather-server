# weather-server nginx reverse proxy
#
# Serves HTTP (dashboard + REST API + SSE) and gRPC on the same port (443).
# gRPC is routed by path prefix — all WeatherService RPCs arrive at
# /weather.v1.WeatherService/<MethodName> so they can be matched exactly.
#
# Usage:
#   nginx -c /path/to/this/nginx.conf
# or drop into /etc/nginx/sites-available/ and symlink to sites-enabled/.

upstream weather_http {
    server 127.0.0.1:8080;
}

upstream weather_grpc {
    server 127.0.0.1:9090;
}

# Redirect plain HTTP to HTTPS.
server {
    listen 80;
    server_name weather.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name weather.example.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── gRPC ────────────────────────────────────────────────────────────────
    # Route all WeatherService RPC calls to the gRPC backend.
    # The Authorization header is forwarded so PSK auth works end-to-end.
    location /weather.v1.WeatherService/ {
        grpc_pass grpc://weather_grpc;
        grpc_set_header Host $host;
        grpc_set_header Authorization $http_authorization;
    }

    # ── SSE ─────────────────────────────────────────────────────────────────
    # Disable buffering so event frames reach the browser immediately.
    # Long read timeout keeps the connection open between 60-second readings.
    location /api/v1/stream/sse {
        proxy_pass http://weather_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # ── HTTP (dashboard + REST API + healthz) ────────────────────────────────
    location / {
        proxy_pass http://weather_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }
}
